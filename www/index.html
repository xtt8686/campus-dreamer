<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校园梦想家</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { text-align: center; padding: 2rem; background: rgba(255,255,255,0.95); border-radius: 24px; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        .logo { font-size: 4rem; margin-bottom: 1rem; }
        h1 { font-size: 1.75rem; color: #1e293b; margin-bottom: 0.5rem; }
        .subtitle { color: #64748b; font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 2rem; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; padding: 1rem 1.5rem; margin-bottom: 0.75rem; border: none; border-radius: 12px; font-size: 1rem; font-weight: 500; cursor: pointer; transition: all 0.25s; }
        .btn-primary { background: #6366f1; color: white; }
        .btn-primary:hover { background: #4f46e5; transform: translateY(-2px); }
        .btn-secondary { background: #f1f5f9; color: #475569; }
        .btn-secondary:hover { background: #e2e8f0; }
        .version { margin-top: 2rem; font-size: 0.75rem; color: #94a3b8; }
        .loading { display: none; padding: 2rem; }
        .spinner { width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 1rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .game-frame { display: none; position: fixed; inset: 0; background: #f8fafc; }
        .game-frame iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="start">
        <div class="container">
            <div class="logo">🏫</div>
            <h1>校园梦想家</h1>
            <p class="subtitle">Campus Dreamer</p>
            <button class="btn btn-primary" onclick="startGame()">
                <span>🎮</span> 新游戏
            </button>
            <button class="btn btn-secondary" onclick="startGame()">
                <span>📚</span> 继续游戏
            </button>
            <p class="version">v1.0 - 开发中</p>
        </div>
    </div>
    <div id="loading" class="loading">
        <div class="container">
            <div class="spinner"></div>
            <p>加载中...</p>
        </div>
    </div>
    <div id="game" class="game-frame">
        <iframe id="gameFrame"></iframe>
    </div>
    <script>
        function startGame() {
            document.getElementById('start').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('game').style.display = 'block';
                document.getElementById('gameFrame').src = 'index.html';
            }, 500);
        }
    </script>
</body>
</html>
