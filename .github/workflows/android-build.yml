name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew
    
    - name: Build debug APK
      working-directory: android
      run: |
        ./gradlew assembleDebug --no-daemon
        echo "=== Checking outputs ==="
        find . -name "*.apk" -type f
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "APK folder not found"
    
    - name: Find and upload APK
      run: |
        APK_PATH=$(find android -name "*.apk" -type f 2>/dev/null | head -1)
        if [ -n "$APK_PATH" ]; then
          echo "Found APK: $APK_PATH"
          mkdir -p upload_apk
          cp "$APK_PATH" upload_apk/
        else
          echo "No APK found"
          mkdir -p upload_apk
          echo "No APK built" > upload_apk/status.txt
        fi
    
    - name: Upload build result
      uses: actions/upload-artifact@v4
      with:
        name: campus-dreamer-build
        path: upload_apk/
        retention-days: 7
